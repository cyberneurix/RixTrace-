<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RixTrace — CNIS Module 01 Build Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#06080b;--s1:#0c0f14;--s2:#111620;--s3:#161c28;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--border3:rgba(255,255,255,0.2);
  --accent:#00ffb3;--accent2:#00c87a;--accentd:rgba(0,255,179,0.1);--accentd2:rgba(0,255,179,0.05);
  --blue:#3b9eff;--blued:rgba(59,158,255,0.1);
  --purple:#9d7fff;--purpled:rgba(157,127,255,0.1);
  --amber:#ffb83b;--amberd:rgba(255,184,59,0.1);
  --red:#ff4d4d;--redd:rgba(255,77,77,0.1);
  --cyan:#00d4ff;--cyand:rgba(0,212,255,0.1);
  --text:#dde2ec;--textm:#7a8399;--textd:#a0aabf;
  --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
  --radius:8px;--radius2:12px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--s1);}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2);}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:220px;min-width:220px;background:var(--s1);border-right:0.5px solid var(--border2);display:flex;flex-direction:column;z-index:10;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:52px;min-height:52px;background:var(--s1);border-bottom:0.5px solid var(--border2);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:5;}
.content{flex:1;overflow-y:auto;padding:20px;}

/* SIDEBAR */
.logo{padding:18px 16px 14px;border-bottom:0.5px solid var(--border);}
.logo-mark{display:flex;align-items:center;gap:9px;margin-bottom:4px;}
.logo-icon{width:28px;height:28px;border-radius:6px;background:var(--accentd);border:1px solid rgba(0,255,179,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-icon svg{width:14px;height:14px;}
.logo-name{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);letter-spacing:0.06em;}
.logo-tag{font-family:var(--mono);font-size:9px;color:var(--textm);letter-spacing:0.12em;text-transform:uppercase;}
.nav{padding:10px 8px;flex:1;overflow-y:auto;}
.nav-section{margin-bottom:16px;}
.nav-label{font-family:var(--mono);font-size:9px;color:var(--textm);letter-spacing:0.15em;text-transform:uppercase;padding:0 8px 6px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:6px;cursor:pointer;border:0.5px solid transparent;transition:all 0.15s;font-size:12px;color:var(--textd);font-weight:500;}
.nav-item:hover{background:var(--s2);color:var(--text);}
.nav-item.active{background:var(--accentd);border-color:rgba(0,255,179,0.2);color:var(--accent);}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.nav-badge{margin-left:auto;font-family:var(--mono);font-size:9px;background:var(--s3);padding:2px 6px;border-radius:10px;color:var(--textm);}
.sidebar-footer{padding:12px 16px;border-top:0.5px solid var(--border);}
.sync-indicator{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;cursor:pointer;}
.sync-dot{width:7px;height:7px;border-radius:50%;}
.sync-dot.connected{background:var(--accent);animation:pulse 2s infinite;}
.sync-dot.disconnected{background:var(--red);}
.sync-dot.connecting{background:var(--amber);animation:pulse 0.8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* TOPBAR */
.page-title{font-size:13px;font-weight:600;color:var(--text);}
.page-subtitle{font-size:11px;color:var(--textm);margin-top:1px;font-family:var(--mono);}
.topbar-actions{display:flex;align-items:center;gap:8px;}
.btn{padding:6px 12px;border-radius:6px;font-family:var(--mono);font-size:10px;cursor:pointer;transition:all 0.15s;border:0.5px solid;letter-spacing:0.05em;}
.btn-ghost{background:transparent;border-color:var(--border2);color:var(--textd);}
.btn-ghost:hover{border-color:var(--border3);color:var(--text);}
.btn-accent{background:var(--accentd);border-color:rgba(0,255,179,0.3);color:var(--accent);}
.btn-accent:hover{background:rgba(0,255,179,0.15);}
.btn-danger{background:var(--redd);border-color:rgba(255,77,77,0.3);color:var(--red);}
.btn-blue{background:var(--blued);border-color:rgba(59,158,255,0.3);color:var(--blue);}

/* CARDS */
.card{background:var(--s1);border:0.5px solid var(--border2);border-radius:var(--radius2);overflow:hidden;}
.card-head{padding:12px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:var(--mono);font-size:10px;color:var(--textm);text-transform:uppercase;letter-spacing:0.12em;}
.card-body{padding:14px 16px;}

/* METRIC CARDS */
.metrics-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.metric{background:var(--s1);border:0.5px solid var(--border2);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden;}
.metric::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.metric.g::after{background:linear-gradient(90deg,var(--accent),transparent);}
.metric.b::after{background:linear-gradient(90deg,var(--blue),transparent);}
.metric.p::after{background:linear-gradient(90deg,var(--purple),transparent);}
.metric.a::after{background:linear-gradient(90deg,var(--amber),transparent);}
.metric.r::after{background:linear-gradient(90deg,var(--red),transparent);}
.metric-lbl{font-family:var(--mono);font-size:9px;color:var(--textm);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;}
.metric-val{font-family:var(--mono);font-size:24px;font-weight:600;}
.metric.g .metric-val{color:var(--accent);}
.metric.b .metric-val{color:var(--blue);}
.metric.p .metric-val{color:var(--purple);}
.metric.a .metric-val{color:var(--amber);}
.metric.r .metric-val{color:var(--red);}
.metric-sub{font-size:11px;color:var(--textm);margin-top:4px;}

/* PHASE BARS */
.phase-row{padding:10px 0;border-bottom:0.5px solid var(--border);}
.phase-row:last-child{border-bottom:none;}
.phase-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;cursor:pointer;}
.phase-name{font-size:12px;font-weight:500;}
.phase-meta{font-family:var(--mono);font-size:10px;color:var(--textm);}
.pbar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:2px;transition:width 0.4s ease;}

/* TASK TABLE */
.task-table{width:100%;border-collapse:collapse;font-size:12px;}
.task-table th{font-family:var(--mono);font-size:9px;color:var(--textm);text-align:left;padding:8px 10px;border-bottom:0.5px solid var(--border2);text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;}
.task-table td{padding:8px 10px;border-bottom:0.5px solid rgba(255,255,255,0.03);vertical-align:middle;}
.task-table tr:last-child td{border-bottom:none;}
.task-table tbody tr{transition:background 0.1s;cursor:pointer;}
.task-table tbody tr:hover{background:rgba(255,255,255,0.02);}
.task-table tbody tr.selected{background:var(--accentd2);}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:0.05em;white-space:nowrap;}
.s-done{background:var(--accentd);color:var(--accent);border:0.5px solid rgba(0,255,179,0.25);}
.s-inprog{background:var(--amberd);color:var(--amber);border:0.5px solid rgba(255,184,59,0.25);}
.s-notstart{background:rgba(255,255,255,0.04);color:var(--textm);border:0.5px solid var(--border);}
.s-blocked{background:var(--redd);color:var(--red);border:0.5px solid rgba(255,77,77,0.25);}
.s-review{background:var(--blued);color:var(--blue);border:0.5px solid rgba(59,158,255,0.25);}
.p-hi{background:var(--redd);color:var(--red);}
.p-med{background:var(--amberd);color:var(--amber);}
.p-lo{background:var(--blued);color:var(--blue);}
.p-crit{background:rgba(255,0,0,0.2);color:#ff6b6b;border:0.5px solid rgba(255,0,0,0.3);}

/* CHECKBOX */
.chk{width:16px;height:16px;border-radius:3px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.chk:hover{border-color:var(--accent);}
.chk.done{background:var(--accent);border-color:var(--accent);}
.chk.done::after{content:'✓';font-size:9px;color:#000;font-weight:700;}
.chk.inprog{border-color:var(--amber);}
.chk.inprog::after{content:'◑';font-size:8px;color:var(--amber);}
.chk.blocked{border-color:var(--red);}
.chk.blocked::after{content:'✕';font-size:9px;color:var(--red);}

/* HOURS INPUT */
.hrs-inp{width:48px;background:var(--s2);color:var(--text);border:0.5px solid var(--border);border-radius:4px;font-family:var(--mono);font-size:11px;padding:2px 6px;text-align:center;outline:none;}
.hrs-inp:focus{border-color:var(--accent);}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:0.5px solid var(--border);}
.tab{padding:8px 14px;font-family:var(--mono);font-size:10px;cursor:pointer;color:var(--textm);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;letter-spacing:0.06em;text-transform:uppercase;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* GRID LAYOUTS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.grid2t{display:grid;grid-template-columns:280px 1fr;gap:12px;}
.gap12{gap:12px;}

/* WEEK CARDS */
.week-card{background:var(--s2);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:all 0.15s;}
.week-card:hover{border-color:var(--border2);}
.week-card.active-week{border-color:rgba(0,255,179,0.35);background:var(--accentd2);}
.wk-num{font-family:var(--mono);font-size:9px;color:var(--textm);margin-bottom:5px;letter-spacing:0.1em;}
.wk-focus{font-size:12px;font-weight:600;margin-bottom:4px;}
.wk-phase{font-family:var(--mono);font-size:9px;margin-bottom:4px;}
.wk-out{font-size:11px;color:var(--textm);}
.wk-hrs{font-family:var(--mono);font-size:9px;color:var(--textm);margin-top:6px;}

/* ARCH LAYERS */
.arch-layer{background:var(--s2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all 0.15s;}
.arch-layer:hover{border-color:var(--border2);}
.arch-layer.selected-layer{border-color:rgba(0,255,179,0.3);background:var(--accentd2);}
.arch-ico{font-size:18px;margin-bottom:6px;}
.arch-name{font-size:12px;font-weight:600;margin-bottom:3px;}
.arch-sub{font-size:10px;color:var(--textm);}
.arch-status{font-family:var(--mono);font-size:9px;margin-top:6px;}

/* SIGNALS */
.signal-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border);}
.signal-item:last-child{border-bottom:none;}
.signal-name{font-family:var(--mono);font-size:11px;min-width:100px;}
.signal-type{font-size:11px;color:var(--textm);flex:1;}
.signal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* VELOCITY */
.vel-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.vel-bar-wrap{width:100%;display:flex;align-items:flex-end;height:80px;background:rgba(255,255,255,0.03);border-radius:3px 3px 0 0;overflow:hidden;}
.vel-bar{width:100%;border-radius:3px 3px 0 0;transition:all 0.2s;cursor:pointer;}
.vel-bar:hover{filter:brightness(1.3);}
.vel-day{font-family:var(--mono);font-size:9px;color:var(--textm);}
.vel-val{font-family:var(--mono);font-size:9px;}

/* SUPABASE SETTINGS */
.settings-section{margin-bottom:20px;}
.settings-title{font-family:var(--mono);font-size:10px;color:var(--textm);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:10px;}
.form-row{margin-bottom:10px;}
.form-label{font-family:var(--mono);font-size:10px;color:var(--textd);margin-bottom:5px;display:block;}
.form-input{width:100%;background:var(--s2);color:var(--text);border:0.5px solid var(--border2);border-radius:6px;font-family:var(--mono);font-size:11px;padding:8px 12px;outline:none;transition:border-color 0.15s;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--textm);}
.form-hint{font-family:var(--mono);font-size:9px;color:var(--textm);margin-top:4px;}
.settings-divider{height:0.5px;background:var(--border);margin:16px 0;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;}
.toggle-label{font-size:12px;color:var(--textd);}
.toggle{width:36px;height:20px;border-radius:10px;border:0.5px solid var(--border2);background:var(--s3);cursor:pointer;position:relative;transition:all 0.2s;}
.toggle.on{background:var(--accentd);border-color:rgba(0,255,179,0.3);}
.toggle::after{content:'';width:14px;height:14px;border-radius:50%;background:var(--textm);position:absolute;top:2px;left:2px;transition:all 0.2s;}
.toggle.on::after{background:var(--accent);left:18px;}
.connection-test{padding:10px 14px;border-radius:6px;font-family:var(--mono);font-size:11px;margin-top:10px;border:0.5px solid var(--border);}
.connection-test.ok{background:var(--accentd);border-color:rgba(0,255,179,0.3);color:var(--accent);}
.connection-test.err{background:var(--redd);border-color:rgba(255,77,77,0.3);color:var(--red);}
.connection-test.testing{background:var(--amberd);border-color:rgba(255,184,59,0.3);color:var(--amber);}

/* DETAIL PANEL */
.detail-panel{background:var(--s2);border:0.5px solid var(--border2);border-radius:var(--radius2);padding:16px;margin-top:12px;}
.detail-title{font-size:13px;font-weight:600;margin-bottom:10px;}
.detail-row{display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap;}
.detail-field{flex:1;min-width:120px;}
.detail-lbl{font-family:var(--mono);font-size:9px;color:var(--textm);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;}
.detail-val{font-size:12px;color:var(--text);}
.notes-area{width:100%;background:var(--s3);color:var(--text);border:0.5px solid var(--border);border-radius:6px;font-family:var(--mono);font-size:11px;padding:8px 12px;resize:none;height:60px;outline:none;margin-top:10px;transition:border-color 0.15s;}
.notes-area:focus{border-color:var(--accent);}
.dep-chip{display:inline-block;padding:2px 8px;background:var(--blued);border:0.5px solid rgba(59,158,255,0.2);border-radius:4px;font-family:var(--mono);font-size:9px;color:var(--blue);margin:2px;}

/* SECTION HEADINGS */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-title{font-size:13px;font-weight:600;}

/* MISC */
.sep{height:0.5px;background:var(--border);margin:14px 0;}
.tag{display:inline-block;padding:1px 7px;border-radius:3px;font-family:var(--mono);font-size:9px;background:rgba(255,255,255,0.05);color:var(--textm);}
.tag.new{background:var(--accentd);color:var(--accent);border:0.5px solid rgba(0,255,179,0.2);}
.hidden{display:none!important;}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:8px;font-family:var(--mono);font-size:11px;z-index:9999;transition:all 0.3s;transform:translateY(0);opacity:1;}
.toast.ok{background:#0a2a1a;border:0.5px solid rgba(0,255,179,0.4);color:var(--accent);}
.toast.err{background:#2a0a0a;border:0.5px solid rgba(255,77,77,0.4);color:var(--red);}
.toast.info{background:#0a1a2a;border:0.5px solid rgba(59,158,255,0.4);color:var(--blue);}

/* SELECT */
select{background:var(--s2);color:var(--text);border:0.5px solid var(--border2);border-radius:5px;font-family:var(--mono);font-size:10px;padding:4px 8px;cursor:pointer;outline:none;}
select:focus{border-color:var(--accent);}

/* PROGRESS RING */
.ring-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;}
svg.ring{transform:rotate(-90deg);}
.ring-circle{transition:stroke-dashoffset 0.6s ease;}

/* SCAN TIMELINE GANTT */
.gantt-bar{height:18px;border-radius:3px;position:relative;display:flex;align-items:center;padding:0 6px;font-family:var(--mono);font-size:9px;color:#000;font-weight:600;min-width:20px;}
.gantt-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.gantt-label{font-family:var(--mono);font-size:10px;color:var(--textm);width:130px;text-align:right;flex-shrink:0;}
.gantt-track{flex:1;background:rgba(255,255,255,0.04);height:18px;border-radius:3px;position:relative;overflow:hidden;}
.gantt-fill{height:100%;border-radius:3px;position:absolute;top:0;display:flex;align-items:center;padding-left:6px;font-family:var(--mono);font-size:9px;transition:width 0.5s ease;}

/* PAGE ANIMATIONS */
.page{animation:fadein 0.2s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* SCROLLABLE TABLE WRAPPER */
.table-wrap{overflow-x:auto;}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.filter-bar select{font-size:10px;}
.filter-count{font-family:var(--mono);font-size:10px;color:var(--textm);margin-left:auto;}

/* ARCHITECTURE DETAIL */
.arch-detail-card{background:var(--s2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:14px;margin-top:12px;}
.arch-tech-chip{display:inline-block;padding:3px 9px;border-radius:4px;font-family:var(--mono);font-size:10px;margin:3px;border:0.5px solid var(--border2);background:var(--s3);color:var(--textd);}

.fullw{grid-column:1/-1;}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <div class="logo-icon">
          <svg viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="2.5" stroke="#00ffb3" stroke-width="1.2"/>
            <circle cx="7" cy="7" r="5.5" stroke="#00ffb3" stroke-width="0.6" stroke-dasharray="2 1.5"/>
            <line x1="7" y1="1" x2="7" y2="3.5" stroke="#00ffb3" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="7" y1="10.5" x2="7" y2="13" stroke="#00ffb3" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="1" y1="7" x2="3.5" y2="7" stroke="#00ffb3" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="10.5" y1="7" x2="13" y2="7" stroke="#00ffb3" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="logo-name">RixTrace</div>
        </div>
      </div>
      <div class="logo-tag">CNIS · Module 01</div>
    </div>

    <nav class="nav">
      <div class="nav-section">
        <div class="nav-label">Overview</div>
        <div class="nav-item active" onclick="gotoPage('dashboard')">
          <div class="nav-dot" style="background:var(--accent)"></div> Dashboard
        </div>
        <div class="nav-item" onclick="gotoPage('phases')">
          <div class="nav-dot" style="background:var(--blue)"></div> Phase Map
          <span class="nav-badge" id="nb-phases">7</span>
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-label">Execution</div>
        <div class="nav-item" onclick="gotoPage('tasks')">
          <div class="nav-dot" style="background:var(--purple)"></div> Task Intel
          <span class="nav-badge" id="nb-tasks">39</span>
        </div>
        <div class="nav-item" onclick="gotoPage('weekly')">
          <div class="nav-dot" style="background:var(--amber)"></div> Weekly Ops

function allTasks() {
  return PHASES.flatMap(p => p.tasks.map(t => ({...t, phaseId:p.id, phaseName:p.sub, phaseColor:p.color})));
}
function getTask(id) { return allTasks().find(t=>t.id===id); }
function getStatus(id) { return STATE.tasks[id]?.status||'Not Started'; }
function getActual(id) { return STATE.tasks[id]?.actual||0; }
function setTaskField(id, field, val) {
  if(!STATE.tasks[id]) STATE.tasks[id]={};
  STATE.tasks[id][field]=val; saveState();
}
function cycleStatus(id,e) {
  if(e) e.stopPropagation();
  const cycle=['Not Started','In Progress','Done','Blocked','In Review'];
  const cur=getStatus(id); const next=cycle[(cycle.indexOf(cur)+1)%cycle.length];
  setTaskField(id,'status',next); renderAll(); renderCurrentPage();
}
function chkClass(s) {
  return s==='Done'?'chk done':s==='In Progress'?'chk inprog':s==='Blocked'?'chk blocked':'chk';
}
function badgeStatus(s) {
  const m={'Done':'s-done','In Progress':'s-inprog','Not Started':'s-notstart','Blocked':'s-blocked','In Review':'s-review'};
  return `<span class="badge ${m[s]||'s-notstart'}">${s}</span>`;
}
function badgePri(p) {
  const m={'Critical':'p-crit','High':'p-hi','Med':'p-med','Low':'p-lo'};
  return `<span class="badge ${m[p]||'p-lo'}">${p}</span>`;
}
function phaseColor(pid) { return PHASES.find(p=>p.id===pid)?.color||'#fff'; }
function totalHours() { return PHASES.reduce((s,p)=>s+p.hours,0); }
function doneCount() { return allTasks().filter(t=>getStatus(t.id)==='Done').length; }
function pct(a,b) { return b===0?0:Math.round(a/b*100); }
function loggedHours() { return allTasks().reduce((s,t)=>s+getActual(t.id),0); }
function inProgCount() { return allTasks().filter(t=>getStatus(t.id)==='In Progress').length; }
function blockedCount() { return allTasks().filter(t=>getStatus(t.id)==='Blocked').length; }
function phaseProgress(p) {

async function testConnection() {
  const {url,anonKey,table}=STATE.supabase;
  if(!url||!anonKey) return toast('Enter URL and Anon Key first','err');
  updateSyncUI('connecting');
  try {
    const r=await fetch(`${url}/rest/v1/${table}?select=id&limit=1`,{
      headers:{'apikey':anonKey,'Authorization':`Bearer ${anonKey}`}
    });
    if(r.ok||r.status===200||r.status===406) {
      STATE.syncStatus='connected'; updateSyncUI('connected');
      toast('Connected to Supabase ✓','ok'); saveState();
    } else { throw new Error(r.status); }
  } catch(e) {
    STATE.syncStatus='disconnected'; updateSyncUI('disconnected');
    toast('Connection failed: '+e.message,'err');
  }
  renderCurrentPage();
}

async function pushToSupabase() {
  const {url,anonKey,table}=STATE.supabase;
  if(!url||!anonKey||STATE.syncStatus!=='connected') return;
  try {
    const payload=allTasks().map(t=>({
      id:t.id, phase:t.phaseId, name:t.name,
      status:getStatus(t.id), actual_hours:getActual(t.id),
      notes:STATE.notes[t.id]||'', priority:t.pri,
      updated_at:new Date().toISOString()
    }));
    const r=await fetch(`${url}/rest/v1/${table}`,{
      method:'POST',
      headers:{'apikey':anonKey,'Authorization':`Bearer ${anonKey}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify(payload)
    });
    if(r.ok) toast('Synced to Supabase ✓','ok');
    else toast('Sync failed: '+r.status,'err');
  } catch(e) { toast('Sync error: '+e.message,'err'); }
}

async function pullFromSupabase() {
  const {url,anonKey,table}=STATE.supabase;
  if(!url||!anonKey||STATE.syncStatus!=='connected') return toast('Not connected','err');
  try {
    const r=await fetch(`${url}/rest/v1/${table}?select=*`,{
      headers:{'apikey':anonKey,'Authorization':`Bearer ${anonKey}`}
    });
    if(!r.ok) throw new Error(r.status);
    const rows=await r.json();
    rows.forEach(row=>{
      if(!STATE.tasks[row.id]) STATE.tasks[row.id]={};
      STATE.tasks[row.id].status=row.status;
      STATE.tasks[row.id].actual=row.actual_hours||0;
      if(row.notes) STATE.notes[row.id]=row.notes;
    });
    saveState(); renderAll(); renderCurrentPage();
    toast(`Pulled ${rows.length} tasks from Supabase ✓`,'ok');
  } catch(e) { toast('Pull failed: '+e.message,'err'); }
}

async function syncNow() {
  if(STATE.syncStatus==='connected') { await pushToSupabase(); await pullFromSupabase(); }
  else toast('Not connected to Supabase. Configure in Settings.','info');
}

function updateSyncUI(status) {
  STATE.syncStatus=status;
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(!dot||!lbl) return;
  dot.className='sync-dot '+status;
  lbl.textContent=status==='connected'?'Supabase connected':status==='connecting'?'Connecting…':'Not connected';
}

    <div class="arch-detail-card" style="border-color:${l.color}30">
      <div style="font-size:13px;font-weight:600;color:${l.color};margin-bottom:6px">${l.ico} ${l.name} — ${l.sub}</div>
      <div style="font-size:12px;color:var(--textd);margin-bottom:10px">${l.desc}</div>
      <div class="detail-lbl" style="margin-bottom:6px">Technologies</div>
      <div>${l.techs.map(t=>`<span class="arch-tech-chip">${t}</span>`).join('')}</div>
    </div>`;
}

// ── SIGNALS ──
function renderSignals() {
  const c=document.getElementById('content');
  const tiers=['Core','Advanced','Extended'];
  c.innerHTML=`
  <div class="page">
    <div class="metrics-grid" style="grid-template-columns:repeat(3,1fr);">
      <div class="metric g"><div class="metric-lbl">Total signals</div><div class="metric-val">${SIGNALS_DATA.length}</div><div class="metric-sub">intelligence feeds</div></div>
      <div class="metric b"><div class="metric-lbl">Core signals</div><div class="metric-val">${SIGNALS_DATA.filter(s=>s.tier==='Core').length}</div><div class="metric-sub">Phase 0–2</div></div>
      <div class="metric p"><div class="metric-lbl">Advanced</div><div class="metric-val">${SIGNALS_DATA.filter(s=>s.tier!=='Core').length}</div><div class="metric-sub">Phase 2+</div></div>
    </div>
    ${tiers.map(tier=>`
      <div class="card" style="margin-bottom:12px;">
        <div class="card-head">
          <span class="card-title">${tier} signals</span>
          <span style="font-family:var(--mono);font-size:9px;color:var(--textm)">${SIGNALS_DATA.filter(s=>s.tier===tier).length} feeds</span>
        </div>
        <div class="card-body" style="padding:0 16px;">
          ${SIGNALS_DATA.filter(s=>s.tier===tier).map(sig=>`
            <div class="signal-item">
              <div style="width:8px;height:8px;border-radius:50%;background:${sig.color};flex-shrink:0"></div>
              <div class="signal-name" style="color:${sig.color}">${sig.name}</div>
              <div class="signal-type">${sig.type}</div>
              ${badgeStatus('Not Started')}
              <button class="btn btn-ghost" style="font-size:9px;padding:3px 8px" onclick="configSignal('${sig.name}')">Configure</button>
            </div>`).join('')}
        </div>
      </div>`).join('')}
  </div>`;
}

function configSignal(name) { toast(`${name} config → set in Supabase settings or .env`,'info'); }

// ── SETTINGS ──
function renderSettings() {
  const sb=STATE.supabase;
  const c=document.getElementById('content');
  c.innerHTML=`
  <div class="page">
    <div class="grid2" style="align-items:start;">
      <div class="card">
        <div class="card-head"><span class="card-title">Supabase Connection</span></div>
        <div class="card-body">
          <div class="settings-section">
            <div class="settings-title">Project credentials</div>
            <div class="form-row">
              <label class="form-label">Supabase Project URL</label>
              <input class="form-input" id="sb-url" type="text" placeholder="https://xyzabcdef.supabase.co" value="${sb.url}">
              <div class="form-hint">Found in Project Settings → API → Project URL</div>
            </div>
            <div class="form-row">
              <label class="form-label">Anon / Public Key</label>
              <input class="form-input" id="sb-key" type="password" placeholder="eyJhbGciOiJIUzI1NiIs..." value="${sb.anonKey}">
              <div class="form-hint">Project Settings → API → anon public key</div>
            </div>
            <div class="form-row">
              <label class="form-label">Table name</label>
              <input class="form-input" id="sb-table" type="text" placeholder="rixtrace_tasks" value="${sb.table}">
              <div class="form-hint">Create this table in your Supabase project (schema below)</div>
            </div>
          </div>
          <div class="settings-divider"></div>
          <div class="settings-section">
            <div class="settings-title">Sync options</div>
            <div class="toggle-row">
              <span class="toggle-label">Auto-sync on task update</span>
              <div class="toggle ${sb.autoSync?'on':''}" id="tog-autosync" onclick="toggleOption('autoSync')"></div>
            </div>
            <div class="toggle-row">
              <span class="toggle-label">Realtime subscription (live updates)</span>
              <div class="toggle ${sb.realtimeEnabled?'on':''}" id="tog-rt" onclick="toggleOption('realtimeEnabled')"></div>
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
            <button class="btn btn-accent" onclick="saveSupabaseSettings()">Save settings</button>
            <button class="btn btn-blue" onclick="testConnection()" id="test-btn">Test connection</button>
            <button class="btn btn-ghost" onclick="pushToSupabase()">↑ Push data</button>
            <button class="btn btn-ghost" onclick="pullFromSupabase()">↓ Pull data</button>
          </div>
          <div id="conn-test-result" style="margin-top:10px;"></div>
        </div>
      </div>

      <div>
        <div class="card" style="margin-bottom:12px;">
          <div class="card-head"><span class="card-title">Supabase table schema</span></div>
          <div class="card-body">
            <div style="font-family:var(--mono);font-size:10px;color:var(--textm);margin-bottom:8px">Run in Supabase SQL editor:</div>
            <pre style="background:var(--s3);border:0.5px solid var(--border);border-radius:6px;padding:12px;font-family:var(--mono);font-size:10px;color:var(--textd);overflow-x:auto;line-height:1.6">${escHtml(`create table rixtrace_tasks (
  id         text primary key,
  phase      text,
  name       text,
  status     text default 'Not Started',
  actual_hours float default 0,
  notes      text default '',
  priority   text,
  updated_at timestamptz default now()
);

-- Enable Row Level Security (recommended)
alter table rixtrace_tasks enable row level security;

-- Allow anon read/write (adjust for prod)
create policy "anon rw" on rixtrace_tasks
  for all using (true) with check (true);

-- Optional: enable realtime
alter publication supabase_realtime
  add table rixtrace_tasks;`)}</pre>
          </div>
        </div>

        <div class="card">
          <div class="card-head"><span class="card-title">Sync status</span></div>
          <div class="card-body">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
              <div class="sync-dot ${STATE.syncStatus}" style="width:10px;height:10px;"></div>
              <span style="font-family:var(--mono);font-size:12px;color:${STATE.syncStatus==='connected'?'var(--accent)':STATE.syncStatus==='connecting'?'var(--amber)':'var(--red)'}">
                ${STATE.syncStatus==='connected'?'Connected':'Not connected'}
              </span>
            </div>
            <div style="font-family:var(--mono);font-size:10px;color:var(--textm)">Tasks in tracker: ${allTasks().length}</div>
            <div style="font-family:var(--mono);font-size:10px;color:var(--textm);margin-top:4px">Total hours estimated: ${totalHours()}h</div>
            <div style="font-family:var(--mono);font-size:10px;color:var(--textm);margin-top:4px">Done: ${doneCount()} / ${allTasks().length}</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function saveSupabaseSettings() {
  STATE.supabase.url=(document.getElementById('sb-url')?.value||'').trim();
  STATE.supabase.anonKey=(document.getElementById('sb-key')?.value||'').trim();
  STATE.supabase.table=(document.getElementById('sb-table')?.value||'rixtrace_tasks').trim();
  saveState(); toast('Settings saved ✓');
  updateSyncUI(STATE.syncStatus);
}

function toggleOption(key) {
  STATE.supabase[key]=!STATE.supabase[key]; saveState();
  const tog=document.getElementById(key==='autoSync'?'tog-autosync':'tog-rt');
  if(tog) tog.classList.toggle('on',STATE.supabase[key]);
  toast(`${key} ${STATE.supabase[key]?'enabled':'disabled'}`,'info');
}

// ── EXPORT ──
function exportData() {
  const payload={
    exported: new Date().toISOString(),
    tasks: allTasks().map(t=>({
      id:t.id, phase:t.phaseId, name:t.name,
      status:getStatus(t.id), estimated_hours:t.est,
      actual_hours:getActual(t.id), priority:t.pri,
      track:t.track, notes:STATE.notes[t.id]||''
    })),
    phases: PHASES.map(p=>{const pr=phaseProgress(p);return{id:p.id,name:p.sub,...pr,totalHours:p.hours};}),
    velocity: STATE.velocity,
    summary: { totalTasks:allTasks().length, done:doneCount(), inProgress:inProgCount(), loggedHours:loggedHours(), totalHours:totalHours() }
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`rixtrace_export_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); toast('Export downloaded ✓');
}

function resetConfirm() {
  if(confirm('Reset all progress? This cannot be undone.')) {
    STATE.tasks={}; STATE.notes={}; STATE.velocity=[0,0,0,0,0,0,0];
    saveState(); renderAll(); renderCurrentPage(); toast('State reset ✓','info');
  }
}
